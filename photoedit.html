<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PhotoEdit App</title>
  <style>
    :root {
      --bg: #101317;
      --panel: #171c22;
      --panel-2: #202731;
      --border: #2e3845;
      --text: #f4f7fb;
      --muted: #a7b0bd;
      --accent: #4f8cff;
      --accent-2: #31c48d;
      --danger: #ff6b6b;
      color-scheme: dark;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
    }

    body {
      display: grid;
      grid-template-columns: 292px minmax(0, 1fr);
    }

    button,
    input {
      font: inherit;
    }

    .sidebar {
      min-width: 0;
      height: 100vh;
      padding: 18px;
      border-right: 1px solid var(--border);
      background: var(--panel);
      display: flex;
      flex-direction: column;
      gap: 16px;
      overflow-y: auto;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .mark {
      width: 42px;
      height: 42px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: white;
      font-weight: 900;
      letter-spacing: 0;
      box-shadow: 0 10px 28px rgba(79, 140, 255, .22);
    }

    h1 {
      margin: 0;
      font-size: 22px;
      line-height: 1.05;
      letter-spacing: 0;
    }

    .sub {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .search {
      width: 100%;
      min-height: 40px;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0 12px;
      background: #0d1116;
      color: var(--text);
      outline: none;
    }

    .search:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(79, 140, 255, .18);
    }

    .tools {
      display: grid;
      gap: 8px;
    }

    .tool {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 11px 12px;
      background: var(--panel-2);
      color: var(--text);
      text-align: left;
      cursor: pointer;
      display: grid;
      grid-template-columns: 30px minmax(0, 1fr);
      gap: 10px;
      align-items: center;
      transition: border-color .16s ease, background .16s ease, transform .16s ease;
    }

    .tool:hover {
      border-color: rgba(79, 140, 255, .68);
      transform: translateY(-1px);
    }

    .tool.active {
      border-color: var(--accent);
      background: rgba(79, 140, 255, .16);
    }

    .icon {
      width: 30px;
      height: 30px;
      border-radius: 7px;
      display: grid;
      place-items: center;
      background: rgba(255, 255, 255, .07);
      font-weight: 800;
      color: #dbe8ff;
    }

    .name {
      min-width: 0;
      font-size: 14px;
      font-weight: 750;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .meta {
      min-width: 0;
      margin-top: 3px;
      color: var(--muted);
      font-size: 11px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .actions {
      margin-top: auto;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .action {
      min-height: 38px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #0d1116;
      color: var(--text);
      cursor: pointer;
    }

    .action:hover {
      border-color: var(--accent);
    }

    .workspace {
      min-width: 0;
      height: 100vh;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      background: #0b0f14;
    }

    .topbar {
      min-width: 0;
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      background: rgba(17, 22, 29, .96);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .active-title {
      min-width: 0;
    }

    .active-title h2 {
      margin: 0;
      font-size: 16px;
      letter-spacing: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .active-title p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .status {
      flex: 0 0 auto;
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 7px 10px;
      color: var(--muted);
      font-size: 12px;
      background: rgba(255, 255, 255, .03);
    }

    .frame-wrap {
      min-width: 0;
      min-height: 0;
      position: relative;
      background:
        linear-gradient(45deg, rgba(255,255,255,.025) 25%, transparent 25%),
        linear-gradient(-45deg, rgba(255,255,255,.025) 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, rgba(255,255,255,.025) 75%),
        linear-gradient(-45deg, transparent 75%, rgba(255,255,255,.025) 75%);
      background-size: 24px 24px;
      background-position: 0 0, 0 12px, 12px -12px, -12px 0;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
      background: #101317;
    }

    .mobile-toggle {
      display: none;
      position: fixed;
      left: 12px;
      bottom: 12px;
      z-index: 4;
      min-height: 42px;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0 14px;
      color: var(--text);
      background: var(--panel-2);
      box-shadow: 0 14px 34px rgba(0, 0, 0, .32);
    }

    @media (max-width: 860px) {
      body {
        grid-template-columns: 1fr;
      }

      .sidebar {
        position: fixed;
        z-index: 3;
        inset: 0 auto 0 0;
        width: min(88vw, 330px);
        transform: translateX(-105%);
        transition: transform .2s ease;
        box-shadow: 18px 0 50px rgba(0, 0, 0, .4);
      }

      body.menu-open .sidebar {
        transform: translateX(0);
      }

      .mobile-toggle {
        display: block;
      }

      .topbar {
        padding-left: 110px;
      }
    }
  </style>
</head>
<body>
  <aside class="sidebar" id="sidebar">
    <div class="brand">
      <div class="mark">PE</div>
      <div>
        <h1>PhotoEdit</h1>
        <p class="sub">Alle Werkzeuge in einer App.</p>
      </div>
    </div>

    <input id="toolSearch" class="search" type="search" placeholder="Tool suchen" autocomplete="off" />
    <div id="toolList" class="tools"></div>

    <div class="actions">
      <button id="reloadToolBtn" class="action" type="button">Neu laden</button>
      <button id="openToolBtn" class="action" type="button">Separat</button>
    </div>
  </aside>

  <main class="workspace">
    <header class="topbar">
      <div class="active-title">
        <h2 id="activeName">Batch Editing</h2>
        <p id="activeMeta">Bereit</p>
      </div>
      <div id="statusText" class="status">Geladen</div>
    </header>
    <div class="frame-wrap">
      <iframe id="toolFrame" title="PhotoEdit Tool" allow="clipboard-read; clipboard-write"></iframe>
    </div>
  </main>

  <button id="mobileToggle" class="mobile-toggle" type="button">Tools</button>

  <script>
    const isRootEditorFile = /photoeditor\.html$/i.test(location.pathname);
    const toolBase = isRootEditorFile ? 'standalone%20tools/' : 'tools/';
    const tools = [
      {
        id: 'editor',
        icon: 'ED',
        name: 'Batch Editing',
        meta: 'Anpassen, packen, exportieren',
        file: 'editor_only.html'
      },
      {
        id: 'showcase',
        icon: 'SC',
        name: 'Showcasing',
        meta: 'Raster, Kacheln, PNG Export',
        file: 'showcase_only.html'
      },
      {
        id: 'background',
        icon: 'BG',
        name: 'Background Remover',
        meta: 'Freistellen und exportieren',
        file: 'background_remover_only.html'
      },
      {
        id: 'crop',
        icon: 'CR',
        name: 'Crop + Resize',
        meta: 'Zuschnitt und Ausgabeformat',
        file: 'crop_resize_only.html'
      },
      {
        id: 'enhance',
        icon: 'AI',
        name: 'Enhance + Upscale',
        meta: 'Super Resolution Pipeline',
        file: 'enhance_upscale_only.html'
      },
      {
        id: 'reference',
        icon: 'RM',
        name: 'Reference Match',
        meta: 'Bildlook an Referenz angleichen',
        file: 'reference_match_only.html'
      },
      {
        id: 'alphabet',
        icon: 'AZ',
        name: 'Alphabet Relation',
        meta: 'Glyphen normalisieren',
        file: 'alphabet_relation_only.html'
      },
      {
        id: 'split',
        icon: 'SP',
        name: 'Split',
        meta: 'Bilder in Teile schneiden',
        file: 'Split.html'
      }
    ];

    const toolList = document.getElementById('toolList');
    const toolSearch = document.getElementById('toolSearch');
    const toolFrame = document.getElementById('toolFrame');
    const activeName = document.getElementById('activeName');
    const activeMeta = document.getElementById('activeMeta');
    const statusText = document.getElementById('statusText');
    const reloadToolBtn = document.getElementById('reloadToolBtn');
    const openToolBtn = document.getElementById('openToolBtn');
    const mobileToggle = document.getElementById('mobileToggle');

    let activeTool = tools[0];

    function toolUrl(tool) {
      return toolBase + tool.file;
    }

    function renderTools() {
      const query = toolSearch.value.trim().toLowerCase();
      toolList.innerHTML = '';
      tools
        .filter(tool => `${tool.name} ${tool.meta}`.toLowerCase().includes(query))
        .forEach(tool => {
          const button = document.createElement('button');
          button.className = `tool${tool.id === activeTool.id ? ' active' : ''}`;
          button.type = 'button';
          button.dataset.toolId = tool.id;
          button.innerHTML = `
            <span class="icon">${tool.icon}</span>
            <span>
              <span class="name">${tool.name}</span>
              <span class="meta">${tool.meta}</span>
            </span>
          `;
          button.addEventListener('click', () => activateTool(tool.id));
          toolList.appendChild(button);
        });
    }

    function activateTool(id) {
      const nextTool = tools.find(tool => tool.id === id) || tools[0];
      activeTool = nextTool;
      activeName.textContent = nextTool.name;
      activeMeta.textContent = nextTool.meta;
      statusText.textContent = 'Lade...';
      toolFrame.src = toolUrl(nextTool);
      localStorage.setItem('photoedit.activeTool', nextTool.id);
      document.body.classList.remove('menu-open');
      renderTools();
    }

    function reloadTool() {
      statusText.textContent = 'Neu geladen';
      toolFrame.src = toolUrl(activeTool);
    }

    function openTool() {
      window.open(toolUrl(activeTool), '_blank', 'noopener');
    }

    toolFrame.addEventListener('load', () => {
      statusText.textContent = activeTool.name;
    });

    toolSearch.addEventListener('input', renderTools);
    reloadToolBtn.addEventListener('click', reloadTool);
    openToolBtn.addEventListener('click', openTool);
    mobileToggle.addEventListener('click', () => {
      document.body.classList.toggle('menu-open');
    });

    document.addEventListener('keydown', event => {
      if (event.key === 'Escape') {
        document.body.classList.remove('menu-open');
      }
      if ((event.ctrlKey || event.metaKey) && event.key.toLowerCase() === 'k') {
        event.preventDefault();
        toolSearch.focus();
      }
    });

    const storedTool = localStorage.getItem('photoedit.activeTool');
    renderTools();
    activateTool(storedTool || tools[0].id);
  </script>
</body>
</html>
